services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - web
      - minio
    environment:
      MINIO_MEDIA_BUCKET: ${MINIO_MEDIA_BUCKET:-agora-media}
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-20m}
    ports:
      - "${APP_HOST_PORT:-18080}:80"
    volumes:
      - ./deploy/nginx/minio-proxy.conf.template:/etc/nginx/templates/default.conf.template:ro

  web:
    build:
      context: .
      args:
        INSTALL_DEV: "false"
    command: gunicorn config.wsgi:application -w ${GUNICORN_WORKERS:-4} -b ${GUNICORN_BIND:-0.0.0.0:${PORT:-8000}}
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_ENV: production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_SECURE_SSL_REDIRECT: "true"
      DJANGO_SESSION_COOKIE_SECURE: "true"
      DJANGO_CSRF_COOKIE_SECURE: "true"
      PORT: ${PORT:-8000}
      DATABASE_URL: ${DATABASE_URL}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      USE_S3: "1"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-agora-media}
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_PROXY_MEDIA: "1"
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      AWS_S3_SIGNATURE_VERSION: ${AWS_S3_SIGNATURE_VERSION:-s3v4}
      AWS_S3_ADDRESSING_STYLE: ${AWS_S3_ADDRESSING_STYLE:-path}
      AWS_QUERYSTRING_AUTH: ${AWS_QUERYSTRING_AUTH:-0}
      AWS_S3_FILE_OVERWRITE: ${AWS_S3_FILE_OVERWRITE:-0}
      AWS_S3_VERIFY: ${AWS_S3_VERIFY:-0}
      APP_NAME: ${APP_NAME:-Agora}
      APP_TAGLINE: ${APP_TAGLINE:-communities first}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
      EMAIL_DELIVERY_MODE: ${EMAIL_DELIVERY_MODE:-console}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-info@kolibri-kollektiv.eu}
      AUTO_MIGRATE_ON_START: ${AUTO_MIGRATE_ON_START:-1}
      AUTO_SEED_ON_START: ${AUTO_SEED_ON_START:-1}
      SEED_SKIP_DEMO_CONTENT: ${SEED_SKIP_DEMO_CONTENT:-0}
      TEST_USER_EMAIL: ${TEST_USER_EMAIL}
      TEST_USER_PASSWORD: ${TEST_USER_PASSWORD}
      TEST_USER_PHONE: ${TEST_USER_PHONE}
      OPS_ADMIN_EMAIL: ${OPS_ADMIN_EMAIL}
      OPS_ADMIN_PASSWORD: ${OPS_ADMIN_PASSWORD}
      OPS_MODERATOR_EMAIL: ${OPS_MODERATOR_EMAIL}
      OPS_MODERATOR_PASSWORD: ${OPS_MODERATOR_PASSWORD}
      SEED_USERS_FILE: ${SEED_USERS_FILE:-data/seed/users.json}
      SEED_ADMINS_FILE: ${SEED_ADMINS_FILE:-data/seed/admins.json}
      SEED_COMMUNITIES_FILE: ${SEED_COMMUNITIES_FILE:-data/seed/communities.json}
    depends_on:
      - minio
    networks:
      - default
      - apps-shared
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${PORT:-8000}/healthz/', timeout=5).read()\""]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "/init-minio.sh"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_MEDIA_BUCKET: ${MINIO_MEDIA_BUCKET:-agora-media}
    volumes:
      - ./scripts/init-minio.sh:/init-minio.sh:ro
volumes:
  minio:

networks:
  apps-shared:
    external: true
