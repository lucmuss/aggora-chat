<header class="topbar">
  <div class="topbar__inner">
    <a href="/" class="brand">
      <span class="brand__mark">A</span>
      <span class="brand__wordmark">
        <strong>{{ APP_NAME }}</strong>
        <small>{{ APP_TAGLINE }}</small>
      </span>
    </a>
    <form method="get" action="{% url 'search' %}" class="header-search">
      <input type="search" name="q" placeholder="Search Agora" data-shortcut-search>
      <span class="header-search__hint">/</span>
    </form>
    <nav class="topnav">
      <a href="{% url 'home' %}" class="{% if request.path == '/' %}is-active{% endif %}">Home</a>
      <a href="{% url 'popular' %}" class="{% if request.path == '/popular/' %}is-active{% endif %}">Popular</a>
      <a href="{% url 'community_discovery' %}" class="{% if request.path == '/c/' %}is-active{% endif %}">Communities</a>
      <a href="{% url 'create_community' %}" class="{% if request.path == '/c/create/' %}is-active{% endif %}">Create Community</a>
    </nav>
    <div class="topbar__actions">
      <a href="{% url 'toggle_theme' %}?next={{ request.get_full_path|urlencode }}" class="pill pill-muted">
        {% if request.COOKIES.agora_theme == 'dark' %}Light mode{% else %}Dark mode{% endif %}
      </a>
      {% if user.is_authenticated %}
        <a href="{% url 'create_community' %}" class="pill">New community</a>
        <a href="{% url 'profile' handle=user.handle|default:'me' %}?tab=saved" class="pill">Saved</a>
        <a href="{% url 'profile' handle=user.handle|default:'me' %}" class="pill pill-muted">{{ user.handle|default:user.email }}</a>
        <a href="/accounts/logout/" class="pill">Log out</a>
      {% else %}
        <a href="/accounts/login/" class="pill pill-primary">Log in</a>
      {% endif %}
    </div>
  </div>
</header>
