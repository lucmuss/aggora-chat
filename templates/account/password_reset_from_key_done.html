{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Password Changed" %} — {{ APP_NAME }}{% endblock %}

{% block content %}
<div class="flex justify-center py-16">
  <div class="w-full max-w-xl bg-white border border-gray-200 rounded-g p-8 text-center">
    <div class="w-12 h-12 rounded-full bg-green-50 text-green-600 flex items-center justify-center font-bold text-lg mx-auto mb-4">✓</div>
    <h1 class="text-2xl font-bold text-gray-900">{% trans "Your password is updated" %}</h1>
    <p class="text-sm text-gray-500 mt-3">You can now sign in with your new password.</p>
    <a href="{% url 'account_login' %}" class="inline-flex mt-6 h-10 px-5 items-center rounded-g bg-primary text-white text-sm font-medium hover:bg-primary-hover">{% trans "Continue to sign in" %}</a>
  </div>
</div>
{% endblock %}
