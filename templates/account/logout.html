{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Sign Out" %} — {{ APP_NAME }}{% endblock %}

{% block content %}
<div class="flex justify-center py-16">
  <div class="w-full max-w-lg bg-white border border-gray-200 rounded-g p-8 text-center">
    <h1 class="text-2xl font-bold text-gray-900">{% trans "Sign Out" %}</h1>
    <p class="text-sm text-gray-500 mt-3">{% trans "Are you sure you want to sign out?" %}</p>
    <form method="post" action="{% url 'account_logout' %}" class="mt-6 flex justify-center gap-2">
      {% csrf_token %}
      {{ redirect_field }}
      <button type="submit" class="h-10 px-5 bg-primary text-white rounded-g text-sm font-medium hover:bg-primary-hover">{% trans "Sign Out" %}</button>
      <a href="/" class="h-10 px-5 inline-flex items-center rounded-g border border-gray-200 text-sm font-medium text-gray-600 hover:bg-gray-50">Stay here</a>
    </form>
  </div>
</div>
{% endblock %}
