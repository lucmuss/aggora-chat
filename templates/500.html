<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Server Error — Agora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#2563EB', hover: '#1D4ED8' },
                        opal: { DEFAULT: '#0D9488', muted: '#CCFBF1' },
                    },
                    fontFamily: { sans: ['"Google Sans"', 'Roboto', 'Arial', 'sans-serif'] },
                    borderRadius: { g: '8px' },
                },
            },
        }
    </script>
</head>

<body class="bg-gray-50 text-gray-900 font-sans text-sm antialiased min-h-screen flex items-center justify-center">
    <div class="text-center px-4">
        <div
            class="w-16 h-16 rounded-2xl bg-opal-muted text-opal flex items-center justify-center text-3xl font-bold mb-6 mx-auto">
            A</div>
        <h1 class="text-6xl font-bold text-gray-200 mb-4">500</h1>
        <h2 class="text-xl font-semibold text-gray-800 mb-2">Something went wrong</h2>
        <p class="text-sm text-gray-500 max-w-md mb-8 mx-auto">An unexpected error occurred on our end. We've been
            notified and are working on a fix. Please try again in a moment.</p>
        <div class="flex gap-3 justify-center">
            <a href="/"
                class="h-10 px-5 bg-primary text-white rounded-g font-medium hover:bg-primary-hover transition-colors text-sm flex items-center"
                style="border-radius:8px">
                Go to Home
            </a>
            <button onclick="window.location.reload()"
                class="h-10 px-5 bg-white border border-gray-200 text-gray-600 rounded-g font-medium hover:bg-gray-50 transition-colors text-sm flex items-center"
                style="border-radius:8px">
                Try Again
            </button>
        </div>
    </div>
</body>

</html>
