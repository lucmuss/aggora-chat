{% if user.is_authenticated %}
  <form method="post" action="/c/{{ community.slug }}/toggle-join/"
        hx-post="/c/{{ community.slug }}/toggle-join/"
        hx-target="this" hx-swap="outerHTML">
    {% csrf_token %}
    <button type="submit"
            class="w-full h-8 rounded-g text-sm font-medium transition-all
                   {% if joined %}bg-white text-opal border border-opal hover:bg-opal-light{% else %}bg-primary text-white hover:bg-primary-hover{% endif %}">
      {% if joined %}Joined{% else %}Join Community{% endif %}
    </button>
  </form>
{% else %}
  <a href="/accounts/login/" class="block w-full h-8 flex items-center justify-center rounded-g bg-primary text-white text-sm font-medium hover:bg-primary-hover transition-colors">
    Log in to join
  </a>
{% endif %}
