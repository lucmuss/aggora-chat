{% if posts %}
  <div class="space-y-2">
    {% for post in posts %}
      {% include "feeds/partials/post_card.html" with post=post %}
    {% endfor %}
  </div>
{% else %}
  <div class="bg-white border border-gdoc-border rounded-g p-8 text-center">
    <svg class="w-10 h-10 mx-auto text-gtext-disabled mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-width="1" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
    </svg>
    <h3 class="font-medium text-sm text-gtext-primary mb-1">{{ empty_title }}</h3>
    <p class="text-xs text-gtext-secondary">{{ empty_copy }}</p>
    {% if empty_cta_url and empty_cta_label %}
      <a href="{{ empty_cta_url }}" class="inline-flex mt-4 h-9 px-4 items-center rounded-g bg-primary text-white text-sm font-medium hover:bg-primary-hover transition-colors">{{ empty_cta_label }}</a>
    {% endif %}
  </div>
{% endif %}
