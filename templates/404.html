{% extends "base.html" %}
{% block title %}Page Not Found — {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center py-24 text-center">
    <div class="w-16 h-16 rounded-2xl bg-opal-muted text-opal flex items-center justify-center text-3xl font-bold mb-6">
        A</div>
    <h1 class="text-6xl font-bold text-gray-200 mb-4">404</h1>
    <h2 class="text-xl font-semibold text-gray-800 mb-2">Page not found</h2>
    <p class="text-sm text-gray-500 max-w-md mb-8">The page you're looking for doesn't exist or may have been moved.
        Check the URL or head back to the homepage.</p>
    <div class="flex gap-3">
        <a href="/"
            class="h-10 px-5 bg-primary text-white rounded-g font-medium hover:bg-primary-hover transition-colors shadow-sm text-sm flex items-center">
            Go to Home
        </a>
        <a href="/c/"
            class="h-10 px-5 bg-white border border-gray-200 text-gray-600 rounded-g font-medium hover:bg-gray-50 transition-colors text-sm flex items-center">
            Browse Communities
        </a>
    </div>
</div>
{% endblock %}
