services:
  web:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    command: python manage.py runserver 0.0.0.0:${PORT:-8000}
    env_file:
      - environment.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
      DJANGO_ENV: ${DJANGO_ENV:-development}
      DJANGO_ALLOWED_HOSTS: ${DOCKER_DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DOCKER_DJANGO_CSRF_TRUSTED_ORIGINS:-http://127.0.0.1:${APP_HOST_PORT:-18080},http://localhost:${APP_HOST_PORT:-18080}}
      APP_PUBLIC_URL: ${DOCKER_APP_PUBLIC_URL:-http://127.0.0.1:${APP_HOST_PORT:-18080}}
      PORT: ${PORT:-8000}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      SEARCH_BACKEND: ${SEARCH_BACKEND:-sql}
      SEARCH_INDEX_ENABLED: ${SEARCH_INDEX_ENABLED:-0}
      AUTO_MIGRATE_ON_START: ${AUTO_MIGRATE_ON_START:-1}
      AUTO_SEED_ON_START: ${AUTO_SEED_ON_START:-1}
      SEED_SKIP_DEMO_CONTENT: ${SEED_SKIP_DEMO_CONTENT:-0}
    ports:
      - "${APP_HOST_PORT:-18080}:${PORT:-8000}"
    depends_on:
      - db
    volumes:
      - ./media:/app/media

  db:
    image: postgres:16
    env_file:
      - environment.env
    networks:
      default:
        aliases:
          - postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agora}
      POSTGRES_USER: ${POSTGRES_USER:-agora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agora_dev}
    volumes:
      - pgdata-dev:/var/lib/postgresql/data

  elasticsearch:
    image: elasticsearch:8.15.0
    profiles: ["search"]
    env_file:
      - environment.env
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "${ELASTICSEARCH_HOST_PORT:-9200}:9200"

volumes:
  pgdata-dev:
