<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-labelledby="agoraLogoTitle agoraLogoDesc">
  <title id="agoraLogoTitle">Agora logo</title>
  <desc id="agoraLogoDesc">A stack of smooth stones next to the Agora wordmark.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="stoneTan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dcb28b"/>
      <stop offset="100%" stop-color="#a46f44"/>
    </linearGradient>
    <linearGradient id="stoneOlive" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8c37d"/>
      <stop offset="100%" stop-color="#788647"/>
    </linearGradient>
    <linearGradient id="stoneSage" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#aec1a4"/>
      <stop offset="100%" stop-color="#7f9774"/>
    </linearGradient>
    <linearGradient id="stoneCream" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8ebc2"/>
      <stop offset="100%" stop-color="#d3b16b"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadow)">
    <ellipse cx="170" cy="255" rx="140" ry="42" fill="url(#stoneTan)" stroke="#7d5537" stroke-width="4" transform="rotate(4 170 255)"/>
    <ellipse cx="200" cy="172" rx="120" ry="36" fill="url(#stoneOlive)" stroke="#6b7340" stroke-width="4" transform="rotate(6 200 172)"/>
    <ellipse cx="182" cy="100" rx="96" ry="31" fill="url(#stoneSage)" stroke="#6f7f69" stroke-width="4" transform="rotate(5 182 100)"/>
    <ellipse cx="192" cy="42" rx="58" ry="22" fill="url(#stoneCream)" stroke="#b08c50" stroke-width="4" transform="rotate(12 192 42)"/>
  </g>

  <g fill="#2f5f3a">
    <text x="380" y="214" font-family="Georgia, 'Times New Roman', serif" font-size="154" letter-spacing="1">Aggora</text>
  </g>
</svg>
